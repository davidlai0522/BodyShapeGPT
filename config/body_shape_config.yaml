# BodyShapeGPT Body-Shape-Focused Dataset Config
#
# Used by generate_body_shape_dataset.py
#
# Usage:
#   python scripts/generate_body_shape_dataset.py --config config/body_shape_config.yaml

# --- Output ---
output: body_shape_dataset_1k.jsonl
gender: neutral

# --- Shape distribution ---
# Specify how many samples to generate for each body shape type.
# Comment out a shape to exclude it.
shapes:
  hourglass:          200
  pear:               200
  apple:              200
  rectangle:          200
  inverted_triangle:  200

# --- Threshold calibration ---
n_calib: 3000          # samples used to calibrate percentile thresholds

# --- Sampling ---
# Each iteration samples `batch_size` random betas, runs one SMPL forward
# pass (no gradients), and keeps those that classify as the target shape.
# Acceptance rate is ~15-25% per shape, so batch_size=512 yields ~80-120
# candidates per call.  Increase for more GPU throughput if VRAM allows.
batch_size: 512        # random betas per iteration

# --- Reproducibility ---
seed: 42

# --- Description style ---
# shape_prob=1.0 means every description explicitly names the body shape type
shape_prob:   1.0
n_extra_min:  1        # min extra body attributes mentioned besides height
n_extra_max:  1        # max extra body attributes mentioned besides height
focus_attrs:  []       # always-include these attrs (e.g. [bmi_proxy])

# --- Vocabulary overrides (optional) ---
# Uncomment to load custom adjective / shape phrase vocabulary.
# vocab_file: config/vocab_config.yaml

# ---------------------------------------------------------------------------
# Shape-specific ratio targets (reference, not used directly by the script)
# ---------------------------------------------------------------------------
#   hourglass          shoulder/hip ≈ 1.0,  waist/hip < 0.72
#   pear               shoulder/hip < 0.83
#   inverted_triangle  shoulder/hip > 1.22
#   rectangle          shoulder/hip ≈ 1.0,  waist/hip > 0.88
#   apple              waist_depth/height > 0.135,  hip/height > 0.22
